name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4.2.0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint:check

      - run: pnpm build

      - run: pnpm publint

      - run: pnpm test:coverage

      - name: Coverage Report
        uses: davelosert/vitest-coverage-report-action@v2.9.3
        if: always()
        with:
          working-directory: packages/placeholder-package
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: "${{ github.event_name == 'pull_request' && 'changes' || 'all' }}"

  # ADMIN-ONLY-START
  template-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Compile template
        run: python admin/compile_template.py

      - name: Verify template is in sync
        run: |
          if ! git diff --exit-code template/; then
            echo "::error::template/ is out of sync. Run 'pnpm compile-template' and commit the changes."
            exit 1
          fi

  template-render-smoke:
    runs-on: ubuntu-latest
    needs: template-sync
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v7.3.1

      - uses: pnpm/action-setup@v4.2.0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Copier
        run: python -m pip install copier

      - name: Render and verify template
        run: python admin/smoke_test_template.py
  # ADMIN-ONLY-END
